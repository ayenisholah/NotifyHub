name: Verification

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

jobs:
  conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate Git and pull request conventions
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: sh scripts/validate-git-conventions.sh

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: sh scripts/verify.sh
      - name: Verify PostgreSQL 18 migrations and constraints
        run: npm run test:integration

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      POSTGRES_DB: notifyhub
      POSTGRES_USER: notifyhub
      POSTGRES_PASSWORD: container-test-password
      API_KEY: container-api-key-with-32-characters
      OPERATOR_KEY: container-operator-key-32-characters
      TOKEN_SECRET: container-token-secret-32-characters
      DEMO_USER_ID: synthetic-container-demo
      WS_ALLOWED_ORIGINS: http://127.0.0.1:4100
      NOTIFYHUB_IMAGE_TAG: ${{ github.sha }}
      NOTIFYHUB_REVISION: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Validate host Nginx routing
        run: |
          docker run --rm \
            --volume "$PWD/deploy/nginx/notifyhub.locations.conf:/etc/nginx/notifyhub.locations.conf:ro" \
            --volume "$PWD/deploy/nginx/validation.conf:/etc/nginx/validation.conf:ro" \
            nginx:alpine nginx -t -c /etc/nginx/validation.conf
      - name: Build the production application image
        run: docker compose build
      - name: Verify immutable production image metadata
        run: test "$(docker image inspect "notifyhub:${GITHUB_SHA}" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')" = "$GITHUB_SHA"
      - name: Start the complete topology
        run: docker compose up --detach --wait --wait-timeout 180
      - name: Smoke-test loopback services and local Mailpit
        run: |
          curl --fail --silent --show-error http://127.0.0.1:4100/ >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:4101/dashboard >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:4125/readyz >/dev/null
      - name: Install the Chromium browser
        run: npx playwright install --with-deps chromium
      - name: Verify the public browser journey
        run: npm run test:e2e
      - name: Verify worker restart recovery
        run: |
          docker compose restart worker-email
          docker compose up --detach --wait --wait-timeout 60 worker-email
      - name: Verify protected backup and scratch restoration
        run: |
          root="$RUNNER_TEMP/notifyhub-backup-contract"
          current="$RUNNER_TEMP/notifyhub-current"
          mkdir -p "$root/backups"
          ln -s "$GITHUB_WORKSPACE" "$current"
          cat > "$root/.env" <<EOF
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          API_KEY=$API_KEY
          OPERATOR_KEY=$OPERATOR_KEY
          TOKEN_SECRET=$TOKEN_SECRET
          DEMO_USER_ID=$DEMO_USER_ID
          WS_ALLOWED_ORIGINS=$WS_ALLOWED_ORIGINS
          NOTIFYHUB_IMAGE_TAG=$NOTIFYHUB_IMAGE_TAG
          NOTIFYHUB_REVISION=$NOTIFYHUB_REVISION
          EOF
          chmod 600 "$root/.env"
          backup="$(NOTIFYHUB_ROOT="$root" NOTIFYHUB_CURRENT="$current" sh scripts/production-backup.sh)"
          test -f "$backup/COMPLETE"
          (cd "$backup" && sha256sum --check SHA256SUMS)
          docker compose exec -T postgres createdb -p 4132 -U "$POSTGRES_USER" notifyhub_restore
          docker compose exec -T postgres pg_restore -p 4132 -U "$POSTGRES_USER" -d notifyhub_restore --no-owner --no-privileges < "$backup/postgresql.dump"
          docker compose exec -T postgres psql -p 4132 -U "$POSTGRES_USER" -d notifyhub_restore -tAc "SELECT to_regclass('public.notifications')" | grep -qx notifications
          docker compose exec -T postgres dropdb -p 4132 -U "$POSTGRES_USER" notifyhub_restore
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop the topology
        if: always()
        run: docker compose down --volumes --remove-orphans

  reliability:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Kill and restart an in-flight email worker
        run: sh scripts/kill-test.sh

  production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [conventions, verify, containers, reliability]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: notifyhub-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://notifyhub.sholaayeni.xyz/
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Chromium for live acceptance
        run: npx playwright install --with-deps chromium
      - name: Configure production SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          case "$VPS_HOST_KEY" in
            ssh-*|ecdsa-*) printf '%s %s\n' "$VPS_HOST" "$VPS_HOST_KEY" > ~/.ssh/known_hosts ;;
            *) printf '%s\n' "$VPS_HOST_KEY" > ~/.ssh/known_hosts ;;
          esac
          chmod 600 ~/.ssh/known_hosts
      - name: Package the exact successful main revision
        run: git archive --format=tar "${GITHUB_SHA}" | gzip -9 > "/tmp/notifyhub-${GITHUB_SHA}.tar.gz"
      - name: Deploy immutable production candidate
        id: deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp "/tmp/notifyhub-${GITHUB_SHA}.tar.gz" "$VPS_USER@$VPS_HOST:/tmp/notifyhub-${GITHUB_SHA}.tar.gz"
          ssh "$VPS_USER@$VPS_HOST" "set -eu; release='/opt/notifyhub/releases/${GITHUB_SHA}'; mkdir -p \"\$release\"; tar -xzf '/tmp/notifyhub-${GITHUB_SHA}.tar.gz' -C \"\$release\"; rm -f '/tmp/notifyhub-${GITHUB_SHA}.tar.gz'; chmod 700 \"\$release\"/scripts/*.sh; NOTIFYHUB_DEPLOY_USER='${VPS_USER}' NOTIFYHUB_RUNTIME_USER=runner \"\$release/scripts/deploy-production.sh\" '${GITHUB_SHA}'"
      - name: Open loopback Mailpit tunnel
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: ssh -f -N -o ExitOnForwardFailure=yes -L 14125:127.0.0.1:4125 "$VPS_USER@$VPS_HOST"
      - name: Verify live metadata and end-to-end delivery
        env:
          PRODUCTION_URL: https://notifyhub.sholaayeni.xyz
          DEMO_E2E_URL: https://notifyhub.sholaayeni.xyz
          DASHBOARD_E2E_URL: https://notifyhub.sholaayeni.xyz/dashboard
          MAILPIT_E2E_URL: http://127.0.0.1:14125
        run: |
          node scripts/verify-live-production.mjs
          npm run test:e2e
      - name: Roll back after failed live acceptance
        if: failure() && steps.deploy.outcome == 'success'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: ssh "$VPS_USER@$VPS_HOST" "/opt/notifyhub/releases/${GITHUB_SHA}/scripts/rollback-production.sh '${GITHUB_SHA}'"
