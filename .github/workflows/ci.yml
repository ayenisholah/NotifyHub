name: Verification

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: sh scripts/verify.sh
      - name: Verify PostgreSQL 18 migrations and constraints
        run: npm run test:integration

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      POSTGRES_DB: notifyhub
      POSTGRES_USER: notifyhub
      POSTGRES_PASSWORD: container-test-password
      API_KEY: container-api-key-with-32-characters
      OPERATOR_KEY: container-operator-key-32-characters
      TOKEN_SECRET: container-token-secret-32-characters
      DEMO_USER_ID: synthetic-container-demo
      WS_ALLOWED_ORIGINS: http://localhost:4100
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Validate host Nginx routing
        run: |
          docker run --rm \
            --volume "$PWD/deploy/nginx/notifyhub.locations.conf:/etc/nginx/notifyhub.locations.conf:ro" \
            --volume "$PWD/deploy/nginx/validation.conf:/etc/nginx/validation.conf:ro" \
            nginx:alpine nginx -t -c /etc/nginx/validation.conf
      - name: Build the production application image
        run: docker compose build
      - name: Start the complete topology
        run: docker compose up --detach --wait --wait-timeout 180
      - name: Smoke-test loopback services and local Mailpit
        run: |
          curl --fail --silent --show-error http://127.0.0.1:4100/ >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:4101/dashboard >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:4125/readyz >/dev/null
      - name: Verify worker restart recovery
        run: |
          docker compose restart worker-email
          docker compose up --detach --wait --wait-timeout 60 worker-email
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop the topology
        if: always()
        run: docker compose down --volumes --remove-orphans

  reliability:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Kill and restart an in-flight email worker
        run: sh scripts/kill-test.sh
